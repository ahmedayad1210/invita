<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;700&amp;display=swap">
<style>
@font-face{font-family:"Plain";src:url("assets/fonts/Plain-Regular.otf") format("opentype");font-weight:400;font-display:swap}
@font-face{font-family:"Plain";src:url("assets/fonts/Plain-Bold.otf") format("opentype");font-weight:600 800;font-display:swap}
:root{--font-heading:"Plain","Alexandria",system-ui,sans-serif;--font-body:"Plain","Alexandria",system-ui,sans-serif;--color-divider:color-mix(in srgb,#0F2341 24%,transparent)}
html,body{margin:0;background:#0F2341}
a{color:#0F2341}a:hover{color:#8E7120}
[dir="rtl"]{--font-heading:"Alexandria",system-ui,sans-serif;--font-body:"Alexandria",system-ui,sans-serif}
.inv-show-m{display:none !important}
@media (max-width:760px){.inv-hide-m{display:none !important}.inv-show-m{display:inline-flex !important}}
</style>
</helmet>
<div dir="{{ dir }}" style="min-height:100vh;display:flex;flex-direction:column;background:#0F2341;font-family:var(--font-body)">
  <nav aria-label="Main" style="position:sticky;top:0;z-index:60;background:color-mix(in srgb,#F0EDE4 88%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;gap:22px;padding:14px max(clamp(20px,5vw,72px),calc((100% - 1200px) / 2 + clamp(20px,5vw,72px)));border-bottom:1px solid var(--color-divider)">
    <a href="index.html" style="display:flex;align-items:center;gap:11px;text-decoration:none;margin-inline-end:auto">
      <img src="assets/uploads/mark.webp" alt="" style="height:34px;width:auto;display:block">
      <img src="assets/uploads/wordmark.webp" alt="Invita — IV Vitamins Therapy" style="height:19px;width:auto;display:block">
    </a>
    <a href="index.html" class="inv-hide-m" style="color:#0F2341;text-decoration:none;font-size:14px">{{ t.home }}</a>
    <a href="index.html#menu" class="inv-hide-m" style="color:#0F2341;text-decoration:none;font-size:14px">{{ t.catalogue }}</a>
    <a href="partners.html" class="inv-hide-m" style="color:#0F2341;text-decoration:none;font-size:14px">{{ t.partners }}</a>
    <button type="button" onClick="{{ toggleLang }}" aria-label="Switch language" style="display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;font-family:var(--font-heading);font-weight:700;font-size:14px;line-height:1.2;border-radius:10px;border:1px solid var(--color-divider);color:#0F2341;background:transparent;cursor:pointer;white-space:nowrap">{{ langLabel }}</button>
    <a href="index.html#book" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;font-family:var(--font-heading);font-weight:700;font-size:14px;line-height:1.2;text-decoration:none;border-radius:10px;background:#0F2341;color:#F0EDE4;white-space:nowrap">{{ t.navBook }}</a>
    <button type="button" class="inv-show-m" onClick="{{ navToggle }}" aria-expanded="{{ navOpen }}" aria-label="Menu" style="align-items:center;justify-content:center;width:38px;height:38px;border-radius:10px;border:1px solid var(--color-divider);background:transparent;color:#0F2341;cursor:pointer;font-size:18px;line-height:1;padding:0">☰</button>
    <sc-if value="{{ navOpen }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;top:100%;inset-inline:0;background:#F0EDE4;border-bottom:1px solid var(--color-divider);box-shadow:0 24px 48px rgba(6,16,30,.18);display:flex;flex-direction:column;padding:8px clamp(20px,5vw,72px) 16px">
        <a href="index.html" style="padding:13px 2px;color:#0F2341;text-decoration:none;font-family:var(--font-heading);font-weight:700;font-size:15px;border-bottom:1px solid var(--color-divider)">{{ t.home }}</a>
        <a href="index.html#menu" style="padding:13px 2px;color:#0F2341;text-decoration:none;font-family:var(--font-heading);font-weight:700;font-size:15px;border-bottom:1px solid var(--color-divider)">{{ t.catalogue }}</a>
        <a href="partners.html" style="padding:13px 2px;color:#0F2341;text-decoration:none;font-family:var(--font-heading);font-weight:700;font-size:15px;border-bottom:1px solid var(--color-divider)">{{ t.partners }}</a>
        <a href="index.html#book" style="padding:13px 2px;color:#0F2341;text-decoration:none;font-family:var(--font-heading);font-weight:700;font-size:15px;border-bottom:1px solid var(--color-divider)">{{ t.navBook }}</a>
      </div>
    </sc-if>
  </nav>
  <header data-screen-label="Menu hero" style="background:radial-gradient(130% 100% at 50% 0%,#1B3560 0%,#0F2341 62%)">
    <div style="max-width:1100px;margin:0 auto;padding:clamp(40px,5vw,72px) clamp(20px,5vw,72px) clamp(36px,4vw,56px);text-align:center">
      <p style="font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#D9B344;margin:0 0 14px">{{ t.heroKicker }}</p>
      <h1 style="font-family:var(--font-heading);font-weight:800;font-size:clamp(28px,3.8vw,50px);line-height:1.3;letter-spacing:-0.01em;margin:0 auto;max-width:24ch;color:#F0EDE4">{{ t.heroTitle }}</h1>
      <p style="font-size:clamp(14px,1.6vw,17px);line-height:1.8;margin:14px auto 0;max-width:56ch;color:rgba(240,237,228,.8)">{{ t.heroLead }}</p>
      <div style="position:relative;margin:clamp(24px,3vw,40px) auto 0;border-radius:20px;overflow:hidden;background:#06101E;box-shadow:0 24px 60px rgba(0,0,0,.4)">
        <video ref="{{ heroVidRef }}" src="assets/video/menu-hero.mp4" poster="assets/video/menu-hero-poster.jpg" autoPlay="autoplay" muted="muted" loop="loop" playsInline="playsinline" preload="auto" style="display:block;width:100%;aspect-ratio:16/9;object-fit:cover"></video>
        <button type="button" onClick="{{ toggleSound }}" style="position:absolute;bottom:14px;inset-inline-end:14px;z-index:2;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;font-family:var(--font-heading);font-weight:700;font-size:12.5px;border-radius:999px;border:1px solid rgba(240,237,228,.35);background:rgba(10,26,49,.55);backdrop-filter:blur(8px);color:#F0EDE4;cursor:pointer">{{ soundLabel }}</button>
      </div>
    </div>
  </header>
  <iframe src="menu-inner.html" title="Invita — The Infusion Menu" style="display:block;width:100%;min-height:100vh;border:none;background:#F5F2EB"></iframe>

  <footer style="background:#0F2341;border-top:1px solid rgba(240,237,228,.14)">
    <div style="max-width:1100px;margin:0 auto;padding:clamp(28px,3.5vw,44px) clamp(20px,5vw,72px);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap">
      <p style="font-size:14px;line-height:1.7;margin:0;color:rgba(240,237,228,.75);max-width:52ch">{{ t.footNote }}</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="menu-inner.html" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:7px;padding:10px 18px;font-family:var(--font-heading);font-weight:700;font-size:13.5px;text-decoration:none;border-radius:10px;border:1px solid rgba(240,237,228,.3);color:#F0EDE4;white-space:nowrap">{{ t.printMenu }}</a>
        <a href="index.html#book" style="display:inline-flex;align-items:center;gap:7px;padding:10px 18px;font-family:var(--font-heading);font-weight:700;font-size:13.5px;text-decoration:none;border-radius:10px;background:#D9B344;color:#0F2341;white-space:nowrap">{{ t.navBook }} {{ arrow }}</a>
      </div>
    </div>
  </footer>
</div>
